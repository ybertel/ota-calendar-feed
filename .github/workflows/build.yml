name: Build OTA ICS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install icalendar

      - name: Build OTA ICS files
        env:
          BOOKING_303: ${{ secrets.BOOKING_303 }}
          BOOKING_305: ${{ secrets.BOOKING_305 }}
          BOOKING_301: ${{ secrets.BOOKING_301 }}
          BOOKING_205: ${{ secrets.BOOKING_205 }}
          BOOKING_203: ${{ secrets.BOOKING_203 }}
          BOOKING_201: ${{ secrets.BOOKING_201 }}
          BOOKING_302: ${{ secrets.BOOKING_302 }}
          BOOKING_206: ${{ secrets.BOOKING_206 }}
          BOOKING_307: ${{ secrets.BOOKING_307 }}
          AIRBNB_303: ${{ secrets.AIRBNB_303 }}
          AIRBNB_305: ${{ secrets.AIRBNB_305 }}
          AIRBNB_301: ${{ secrets.AIRBNB_301 }}
          AIRBNB_205: ${{ secrets.AIRBNB_205 }}
          AIRBNB_203: ${{ secrets.AIRBNB_203 }}
          AIRBNB_201: ${{ secrets.AIRBNB_201 }}
          AIRBNB_302: ${{ secrets.AIRBNB_302 }}
          AIRBNB_206: ${{ secrets.AIRBNB_206 }}
          AIRBNB_307: ${{ secrets.AIRBNB_307 }}
        run: |
          python - <<'PY'
          import os
          import sys
          import uuid
          import urllib.request
          from pathlib import Path
          from datetime import datetime, date

          from icalendar import Calendar


          SOURCES = {
              "B": {
                  "303": os.environ.get("BOOKING_303", "").strip(),
                  "305": os.environ.get("BOOKING_305", "").strip(),
                  "301": os.environ.get("BOOKING_301", "").strip(),
                  "205": os.environ.get("BOOKING_205", "").strip(),
                  "203": os.environ.get("BOOKING_203", "").strip(),
                  "201": os.environ.get("BOOKING_201", "").strip(),
                  "302": os.environ.get("BOOKING_302", "").strip(),
                  "206": os.environ.get("BOOKING_206", "").strip(),
                  "307": os.environ.get("BOOKING_307", "").strip(),
              },
              "A": {
                  "303": os.environ.get("AIRBNB_303", "").strip(),
                  "305": os.environ.get("AIRBNB_305", "").strip(),
                  "301": os.environ.get("AIRBNB_301", "").strip(),
                  "205": os.environ.get("AIRBNB_205", "").strip(),
                  "203": os.environ.get("AIRBNB_203", "").strip(),
                  "201": os.environ.get("AIRBNB_201", "").strip(),
                  "302": os.environ.get("AIRBNB_302", "").strip(),
                  "206": os.environ.get("AIRBNB_206", "").strip(),
                  "307": os.environ.get("AIRBNB_307", "").strip(),
              },
          }


          def log(msg: str):
              print(msg, flush=True)


          def fetch_text(url: str) -> str:
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0",
                      "Accept": "text/calendar,text/plain,*/*",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  charset = resp.headers.get_content_charset() or "utf-8"
                  return resp.read().decode(charset, errors="replace")


          def normalize_to_date(value):
              if value is None:
                  return None
              if isinstance(value, datetime):
                  return value.date()
              if isinstance(value, date):
                  return value
              if hasattr(value, "dt"):
                  return normalize_to_date(value.dt)
              return None


          def text_contains_cancel_words(*parts):
              text = " ".join([str(p or "") for p in parts]).lower()
              keywords = [
                  "cancel",
                  "cancelled",
                  "canceled",
                  "reservation canceled",
                  "reservation cancelled",
              ]
              return any(k in text for k in keywords)


          def parse_ics_events(text: str):
              cal = Calendar.from_ical(text)
              events = []

              for component in cal.walk():
                  if component.name != "VEVENT":
                      continue

                  status = str(component.get("STATUS", "")).upper()
                  summary = str(component.get("SUMMARY", ""))
                  description = str(component.get("DESCRIPTION", ""))

                  # 취소 이벤트 제거
                  if status == "CANCELLED":
                      continue

                  if text_contains_cancel_words(summary, description):
                      continue

                  dtstart = component.get("DTSTART")
                  dtend = component.get("DTEND")

                  if not dtstart or not dtend:
                      continue

                  start = normalize_to_date(dtstart.dt)
                  end = normalize_to_date(dtend.dt)

                  if not start or not end:
                      continue

                  stay_days = (end - start).days
                  if stay_days <= 0:
                      continue

                  # 비정상 장기 블록 제거
                  if stay_days > 60:
                      continue

                  events.append((start, end))

              return sorted(events)


          def merge_ranges(ranges):
              if not ranges:
                  return []

              merged = [list(ranges[0])]
              for start, end in ranges[1:]:
                  last_start, last_end = merged[-1]

                  # 겹치거나 이어지면 하나로 합침
                  if start <= last_end:
                      if end > last_end:
                          merged[-1][1] = end
                  else:
                      merged.append([start, end])

              return [(s, e) for s, e in merged]


          def fmt_md(d):
              return f"{d.month}/{d.day}"


          def build_summary(source: str, room: str, checkin, checkout):
              return f"{source} {room} {fmt_md(checkin)}~{fmt_md(checkout)}"


          def build_combined_summary(room: str, checkin, checkout):
              return f"{room} {fmt_md(checkin)}~{fmt_md(checkout)}"


          def build_event_uid(source: str, room: str, checkin, checkout):
              seed = f"{source}-{room}-{checkin.isoformat()}-{checkout.isoformat()}"
              stable_id = uuid.uuid5(uuid.NAMESPACE_DNS, seed)
              return f"{stable_id}@ota-combined"


          def write_ics_file(path: Path, cal_name: str, events: list[dict]):
              now_utc = datetime.utcnow().strftime("%Y%m%dT%H%M%SZ")
              lines = [
                  "BEGIN:VCALENDAR",
                  "VERSION:2.0",
                  "PRODID:-//ybertel//OTA Combined Calendar//EN",
                  "CALSCALE:GREGORIAN",
                  "METHOD:PUBLISH",
                  f"X-WR-CALNAME:{cal_name}",
                  "X-WR-TIMEZONE:Asia/Seoul",
              ]

              for ev in events:
                  dtstart = ev["checkin"].strftime("%Y%m%d")
                  dtend = ev["checkout"].strftime("%Y%m%d")
                  uid = build_event_uid(ev["source"], ev["room"], ev["checkin"], ev["checkout"])

                  lines.extend([
                      "BEGIN:VEVENT",
                      f"DTSTAMP:{now_utc}",
                      f"UID:{uid}",
                      f"DTSTART;VALUE=DATE:{dtstart}",
                      f"DTEND;VALUE=DATE:{dtend}",
                      f"SUMMARY:{ev['summary']}",
                      "END:VEVENT",
                  ])

              lines.append("END:VCALENDAR")
              path.write_text("\r\n".join(lines) + "\r\n", encoding="utf-8")


          def build_combined_events(events: list[dict]):
              grouped = {}

              for ev in events:
                  room = ev["room"]
                  grouped.setdefault(room, []).append((ev["checkin"], ev["checkout"]))

              combined_events = []

              for room, ranges in grouped.items():
                  ranges.sort()
                  merged = merge_ranges(ranges)

                  for checkin, checkout in merged:
                      combined_events.append({
                          "source": "C",
                          "room": room,
                          "checkin": checkin,
                          "checkout": checkout,
                          "summary": build_combined_summary(room, checkin, checkout),
                      })

              combined_events.sort(key=lambda x: (x["checkin"], x["room"]))
              return combined_events


          all_events = []
          airbnb_events = []
          booking_events = []

          total_success_sources = 0
          total_failed_sources = 0

          for source, rooms in SOURCES.items():
              for room, url in rooms.items():
                  if not url:
                      log(f"[SKIP] {source}-{room}: empty url")
                      continue

                  try:
                      text = fetch_text(url)
                      log(f"[FETCH] {source}-{room}: ok, {len(text)} chars")

                      if "BEGIN:VCALENDAR" not in text:
                          raise ValueError("response is not a valid VCALENDAR payload")

                      ranges = parse_ics_events(text)
                      log(f"[PARSE] {source}-{room}: {len(ranges)} raw events")

                      merged = merge_ranges(ranges)
                      log(f"[MERGE] {source}-{room}: {len(merged)} merged events")

                      for checkin, checkout in merged:
                          event = {
                              "source": source,
                              "room": room,
                              "checkin": checkin,
                              "checkout": checkout,
                              "summary": build_summary(source, room, checkin, checkout),
                          }
                          all_events.append(event)

                          if source == "A":
                              airbnb_events.append(event)
                          elif source == "B":
                              booking_events.append(event)

                      total_success_sources += 1

                  except Exception as e:
                      total_failed_sources += 1
                      log(f"[ERROR] {source}-{room}: {type(e).__name__}: {e}")

          airbnb_events.sort(key=lambda x: (x["checkin"], x["room"]))
          booking_events.sort(key=lambda x: (x["checkin"], x["room"]))
          combined_events = build_combined_events(all_events)

          docs = Path("docs")
          docs.mkdir(exist_ok=True)

          write_ics_file(docs / "combined.ics", "OTA Combined", combined_events)
          write_ics_file(docs / "airbnb.ics", "OTA Airbnb", airbnb_events)
          write_ics_file(docs / "booking.ics", "OTA Booking", booking_events)

          log("=" * 60)
          log(f"SUCCESS SOURCES: {total_success_sources}")
          log(f"FAILED SOURCES : {total_failed_sources}")
          log(f"COMBINED EVENTS: {len(combined_events)}")
          log(f"AIRBNB EVENTS  : {len(airbnb_events)}")
          log(f"BOOKING EVENTS : {len(booking_events)}")
          log("OUTPUT         : docs/combined.ics, docs/airbnb.ics, docs/booking.ics")

          if len(combined_events) == 0:
              log("[FATAL] No combined events generated. Check secrets or ICS parsing.")
              sys.exit(1)
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/combined.ics docs/airbnb.ics docs/booking.ics
          git diff --cached --quiet || git commit -m "Update OTA ICS files"
          git push
